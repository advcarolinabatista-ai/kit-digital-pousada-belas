    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      .slide-container { 
        width: 1280px; 
        min-height: 720px; 
        background: #F5F7FA; 
        font-family: 'Inter', sans-serif;
        color: #4A5568;
        overflow: hidden;
      }
      .header {
        padding-top: 60px;
        text-align: center;
      }
      .title {
        font-family: 'Inter', sans-serif;
        font-size: 48px;
        color: #2C3E50;
        margin-bottom: 10px;
      }
      .subtitle {
        font-family: 'Inter', sans-serif;
        font-size: 18px;
        color: #38B2AC;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .menu-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px; /* reduced from 30px to save vertical space */
        padding-top: 40px; /* reduced from 60px */
        padding-left: 100px;
        padding-right: 100px;
      }
      .menu-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      .icon-box {
        width: 80px;
        height: 80px;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #E2E8F0;
        margin-bottom: 15px;
      }
      .icon-box i {
        font-size: 32px;
        color: #38B2AC;
      }
      .item-label {
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        font-weight: 600;
        color: #2C3E50;
        line-height: 1.2;
      }
      .decorative-img {
        position: absolute;
        bottom: 40px;
        right: 40px;
        width: 150px;
        height: 150px;
        opacity: 0.1;
        object-fit: contain;
      }
    </style>
</head>
